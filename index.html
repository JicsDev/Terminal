<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel de Partidas - STTRANS</title>
    <style>
        :root { --verde-sttrans: #009639; --amarelo-destaque: #FFD700; --branco: #FFFFFF; }
        body { background-color: var(--verde-sttrans); color: var(--branco); font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 30px; background-color: rgba(0,0,0,0.2); border-bottom: 3px solid var(--amarelo-destaque); }
        
        .logo { height: 60px; } /* Ajuste o tamanho da logo aqui */
        
        .relogio-container { display: flex; flex-direction: column; align-items: flex-end; }
        #relogio { font-size: 2vw; font-weight: bold; }
        #data-atual { font-size: 1vw; }

        h1 { font-size: 1.5vw; text-transform: uppercase; margin: 0; }
        
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; height: 85vh; }
        #destaque { display: grid; grid-template-rows: auto 1fr; gap: 15px; }
        #box-partida { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; }
        #box-partida h2 { color: var(--amarelo-destaque); font-size: 1.5vw; margin: 0 0 10px 0; }
        #info-destaque { font-size: 2.5vw; font-weight: bold; line-height: 1.1; }
        #box-informativo { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 2vw; font-weight: bold; color: var(--amarelo-destaque); transition: opacity 0.5s; }
        
        #lista-proximos { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 1.3vw; }
        th { text-align: left; color: var(--amarelo-destaque); padding: 10px; border-bottom: 2px solid var(--branco); }
        td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo"> 
        
        <h1>Terminal de Transporte Alternativo</h1>
        
        <div class="relogio-container">
            <div id="relogio">00:00:00</div>
            <div id="data-atual">Carregando data...</div>
        </div>
    </header>

    <main class="container">
        <section id="destaque">
            <div id="box-partida">
                <h2>Próxima Partida</h2>
                <div id="info-destaque">Carregando...</div>
            </div>
            <div id="box-informativo">Bem-vindo</div>
        </section>

        <section id="lista-proximos">
            <table>
                <thead>
                    <tr><th>Chegada</th><th>Saída</th><th>Motorista</th><th>Destino</th><th>Plataforma</th></tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </section>
    </main>

    <script>
        const linkDados = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=0&single=true&output=csv';
        const linkConfig = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=1303599216&single=true&output=csv';

        document.addEventListener("DOMContentLoaded", function() {
            // Atualiza relógio e data
            setInterval(() => {
                const agora = new Date();
                document.getElementById('relogio').innerText = agora.toLocaleTimeString();
                document.getElementById('data-atual').innerText = agora.toLocaleDateString();
            }, 1000);

            async function carregarTudo() {
                try {
                    const resp = await fetch(`${linkDados}&t=${Date.now()}`);
                    const text = await resp.text();
                    const linhas = text.split('\n').filter(l => l.trim() !== "");
                    
                    const agora = new Date();
                    const minutosAtuais = agora.getHours() * 60 + agora.getMinutes();
                    
                    const tbody = document.getElementById('corpo-tabela');
                    const infoDestaque = document.getElementById('info-destaque');
                    tbody.innerHTML = '';
                    
                    let listaFutura = [];
                    for (let i = 1; i < linhas.length; i++) {
                        const cols = linhas[i].split(',');
                        if (cols.length < 5) continue;
                        const [h, m] = cols[1].trim().split(':'); 
                        const minutosSaida = parseInt(h) * 60 + parseInt(m);
                        
                        if (minutosSaida >= minutosAtuais) {
                            listaFutura.push({ chegada: cols[0], saida: cols[1], destino: cols[2], plataforma: cols[3], motorista: cols[4] });
                        }
                    }

                    // LIMITE DE 8 VEÍCULOS (Aqui foi alterado para 8)
                    listaFutura.slice(0, 8).forEach(v => {
                        tbody.innerHTML += `<tr><td>${v.chegada}</td><td>${v.saida}</td><td>${v.motorista}</td><td>${v.destino}</td><td>${v.plataforma}</td></tr>`;
                    });

                    // Lógica de Destaque
                    if (listaFutura.length > 0) {
                        const v = listaFutura[0];
                        infoDestaque.innerHTML = `${v.destino} - ${v.saida}<br><span style="font-size: 1.8vw;">Motorista: ${v.motorista}, Plat: ${v.plataforma}</span>`;
                    } else {
                        infoDestaque.innerHTML = "Não há mais partidas hoje.";
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Fim das operações.</td></tr>';
                    }

                    // ... Configurações (restante mantido igual) ...
                } catch(e) { console.error("Erro:", e); }
            }

            // Iniciar sincronizado
            function iniciarSincronizado() {
                carregarTudo();
                const agora = new Date();
                const delay = 30000 - (agora.getSeconds() * 1000 + agora.getMilliseconds()) % 30000;
                setTimeout(() => { carregarTudo(); setInterval(carregarTudo, 30000); }, delay);
            }
            iniciarSincronizado();
        });
    </script>
</body>
</html>
