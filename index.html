<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Partidas - STTRANS</title>
    <style>
        * { box-sizing: border-box; } /* Isso evita que padding aumente o tamanho da tela */
        :root { --verde-sttrans: #009639; --amarelo-destaque: #FFD700; --branco: #FFFFFF; }
        
        body { background-color: var(--verde-sttrans); color: var(--branco); font-family: sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 3px solid var(--amarelo-destaque); background-color: rgba(0,0,0,0.2); }
        .logo { height: 40px; }
        
        /* Container Principal */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        
        /* Ajuste de Caixas */
        #box-partida, #box-informativo, #lista-proximos { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; }
        
        /* Ajuste de Texto */
        h1 { font-size: 1.2rem; margin: 0; }
        #relogio { font-size: 1.2rem; font-weight: bold; }
        #info-destaque { font-size: 1.5rem; font-weight: bold; }
        
        /* Tabela */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { color: var(--amarelo-destaque); text-align: left; padding: 5px; }
        td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        /* MODO CELULAR (Telas menores que 768px) */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; } /* Empilha tudo */
            .relogio-container { display: none; } /* Esconde relógio no celular */
            h1 { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Logo" class="logo"> 
        <h1>STTRANS</h1>
        <div class="relogio-container">
            <div id="relogio">00:00:00</div>
        </div>
    </header>

    <main class="container">
        <div id="box-partida">
            <h2>Próxima Partida</h2>
            <div id="info-destaque">Carregando...</div>
        </div>

        <div id="lista-proximos">
            <table>
                <thead><tr><th>Chegada</th><th>Saída</th><th>Motorista</th><th>Destino</th><th>Plataforma</th></tr></thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>

        <div id="box-informativo">Carregando mensagens...</div>
    </main>

    <script>
        const linkDados = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=0&single=true&output=csv';
        
        // --- FUNÇÃO DE RELÓGIO ---
        function atualizarRelogio() {
            document.getElementById('relogio').innerText = new Date().toLocaleTimeString();
        }
        setInterval(atualizarRelogio, 1000);

        // --- FUNÇÃO DE DADOS ---
        async function carregarDados() {
            try {
                const response = await fetch(`${linkDados}&t=${Date.now()}`);
                if (!response.ok) throw new Error('Falha na rede');
                const text = await response.text();
                const linhas = text.split('\n').filter(l => l.trim() !== "");
                
                const tbody = document.getElementById('corpo-tabela');
                tbody.innerHTML = '';
                
                // Exemplo simples de preenchimento (ajuste conforme seu formato real)
                for (let i = 1; i < Math.min(linhas.length, 9); i++) {
                    const cols = linhas[i].split(',');
                    tbody.innerHTML += `<tr><td>${cols[0]}</td><td>${cols[1]}</td><td>${cols[4]}</td><td>${cols[2]}</td><td>${cols[3]}</td></tr>`;
                }
                document.getElementById('info-destaque').innerText = "Dados carregados com sucesso!";
            } catch (err) {
                console.error("Erro nos dados:", err);
                document.getElementById('info-destaque').innerText = "Erro ao carregar dados.";
            }
        }

        // Iniciar
        document.addEventListener('DOMContentLoaded', () => {
            atualizarRelogio();
            carregarDados();
            setInterval(carregarDados, 30000);
        });
    </script>
</body>
</html>
