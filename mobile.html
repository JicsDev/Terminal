<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel Celular - STTRANS</title>
    <style>
        :root { --verde-sttrans: #009639; --amarelo-destaque: #FFD700; --branco: #FFFFFF; }
        body { background-color: var(--verde-sttrans); color: var(--branco); font-family: sans-serif; margin: 0; padding: 10px; }
        
        header { text-align: center; margin-bottom: 15px; border-bottom: 2px solid var(--amarelo-destaque); padding-bottom: 10px; }
        h1 { font-size: 1.2rem; margin: 5px 0; }
        
        /* Blocos empilhados */
        .bloco { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        
        /* Destaque */
        #info-destaque { font-size: 1.3rem; font-weight: bold; color: var(--branco); }
        
        /* Tabela Otimizada */
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { color: var(--amarelo-destaque); text-align: left; padding: 5px; border-bottom: 1px solid var(--branco); }
        td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        /* Mensagens */
        #box-informativo { font-size: 1rem; font-weight: bold; text-align: center; color: var(--amarelo-destaque); min-height: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>STTRANS <br> Terminal de Transporte Alternativo </h1>
    </header>

    <div class="bloco" id="box-partida">
        <strong>Próxima Partida:</strong>
        <div id="info-destaque">Carregando...</div>
    </div>

    <div class="bloco" id="lista-proximos">
        <table>
            <thead><tr><th>Chegada</th><th>Saída</th><th>Motorista</th><th>Destino</th></tr></thead>
            <tbody id="corpo-tabela"></tbody>
        </table>
    </div>

    <div class="bloco" id="box-informativo">Aguardando...</div>

    <script>
        const linkDados = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=0&single=true&output=csv';
        const linkConfig = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=1303599216&single=true&output=csv';

        async function carregarTudo() {
            try {
                // Carrega Dados
                const resp = await fetch(`${linkDados}&t=${Date.now()}`);
                const text = await resp.text();
                const linhas = text.split('\n').filter(l => l.trim() !== "");
                
                const agora = new Date();
                const minAtuais = agora.getHours() * 60 + agora.getMinutes();
                const tbody = document.getElementById('corpo-tabela');
                tbody.innerHTML = '';
                
                let achou = false;
                for (let i = 1; i < linhas.length; i++) {
                    const cols = linhas[i].split(',');
                    const [h, m] = cols[1].trim().split(':');
                    if (parseInt(h) * 60 + parseInt(m) >= minAtuais) {
                        // Tabela SEM PLATAFORMA (cols 0, 1, 4, 2)
                        tbody.innerHTML += `<tr><td>${cols[0]}</td><td>${cols[1]}</td><td>${cols[4]}</td><td>${cols[2]}</td></tr>`;
                        if (!achou) {
                            document.getElementById('info-destaque').innerHTML = `${cols[2]}<br>${cols[1]} - Motorista: ${cols[4]}`;
                            achou = true;
                        }
                    }
                }
                
                // Carrega Mensagens
                const respCfg = await fetch(`${linkConfig}&t=${Date.now()}`);
                const textCfg = await respCfg.text();
                const linhasCfg = textCfg.split('\n').filter(l => l.trim() !== "");
                if (linhasCfg.length > 1) {
                    document.getElementById('box-informativo').innerText = linhasCfg[1].split(',')[0];
                }
            } catch(e) { console.error(e); }
        }

        carregarTudo();
        setInterval(carregarTudo, 30000);
    </script>
</body>
</html>
