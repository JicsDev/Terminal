<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STTRANS Mobile</title>
    <style>
        :root { --verde-sttrans: #009639; --amarelo-destaque: #FFD700; --branco: #FFFFFF; }
        body { background-color: var(--verde-sttrans); color: var(--branco); font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* Telas */
        #tela-fechado { display: none; text-align: center; padding-top: 50px; }
        #conteudo-principal { display: block; }
        
        .bloco { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        h2 { color: var(--amarelo-destaque); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { color: var(--amarelo-destaque); text-align: left; padding: 5px; border-bottom: 1px solid var(--branco); }
        td { padding: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        #box-informativo { font-weight: bold; text-align: center; color: var(--amarelo-destaque); }
        .foto-terminal {
    width: 90%;           /* Ocupa 90% da largura da tela */
    max-width: 300px;     /* Não deixa passar de um tamanho razoável */
    border-radius: 15px;  /* Deixa os cantos arredondados */
    margin: 15px auto;    /* Centraliza a imagem */
    display: block;
    border: 3px solid var(--amarelo-destaque); /* Uma bordinha pra dar destaque */
}
    </style>
</head>
<body>

    <div id="tela-fechado">
        <h2>Terminal Fechado</h2>  
        
       <img src="terminal.jpg" alt="Foto do Terminal" class="foto-terminal"> 
        
        <p id="msg-fechado"></p>
    </div>

    <div id="conteudo-principal">
        <div class="bloco">
            <strong>Próxima Partida:</strong><br>
            <span id="info-destaque">Carregando...</span>
        </div>
        <div class="bloco">
            <table>
                <thead><tr><th>Saída</th><th>Motorista</th><th>Destino</th></tr></thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
        <div class="bloco" id="box-informativo">Carregando avisos...</div>
    </div>

    <script>
        const linkDados = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=0&single=true&output=csv';
        const linkConfig = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRucRudwW4SYG4nzihkR7xcAUAxxXFjO9KKsnxA2NTW6b-t10sz6RZrvcgx8AsjPEl6fJW9iiznYo26/pub?gid=1303599216&single=true&output=csv';

        let mensagens = [];
        let msgIndex = 0;

                async function iniciarSistema() {
            try {
                const respCfg = await fetch(`${linkConfig}&t=${Date.now()}`);
                const textCfg = await respCfg.text();
                const linhas = textCfg.split('\n').filter(l => l.trim() !== "");
                
                const agora = new Date();
                const diaSemana = agora.getDay();
                const minAgora = agora.getHours() * 60 + agora.getMinutes();
                
                let estaAberto = false;
                let msgFechado = "Terminal Fechado.";

                console.log("Hoje é dia:", diaSemana, "e o horário é:", minAgora);

                linhas.forEach(linha => {
                    const colunas = linha.split(',');
                    if (colunas.length < 2) return;
                    
                    const tipo = colunas[0].trim();
                    const val1 = colunas[1] ? colunas[1].trim() : "";
                    
                    // Lógica para MsgFechado
                    if (tipo === 'MsgFechado') {
                        msgFechado = val1;
                    }
                    
                    // Lógica para Horário (Pega o resto da linha e tenta achar horários)
                    if (tipo === 'Horario') {
                        // Junta as colunas 2 e 3 para garantir que pega os horários
                        const textoHorario = colunas.slice(2).join(',').replace(/\s/g, ''); 
                        const partes = textoHorario.split(',');
                        
                        if (partes.length >= 2) {
                            const [hA, mA] = partes[0].split(':');
                            const [hF, mF] = partes[1].split(':');
                            
                            const minAbre = parseInt(hA)*60 + parseInt(mA);
                            const minFecha = parseInt(hF)*60 + parseInt(mF);
                            
                            console.log("Validando:", val1, "Abre:", minAbre, "Fecha:", minFecha);
                            
                            if ((val1 === 'SegSex' && diaSemana >= 1 && diaSemana <= 5) || (val1 === 'Sab' && diaSemana === 6)) {
                                if (minAgora >= minAbre && minAgora <= minFecha) estaAberto = true;
                            }
                        }
                    }
                });

                if (!estaAberto) {
                    console.log("Lógica final: Terminal Fechado.");
                    document.getElementById('conteudo-principal').style.display = 'none';
                    document.getElementById('tela-fechado').style.display = 'block';
                    document.getElementById('msg-fechado').innerHTML = msgFechado;
                } else {
                    document.getElementById('conteudo-principal').style.display = 'block';
                    document.getElementById('tela-fechado').style.display = 'none';
                    carregarDados();
                }
            } catch(e) { console.error("Erro no sistema:", e); }
        }
        
        async function carregarDados() {
            const resp = await fetch(`${linkDados}&t=${Date.now()}`);
            const text = await resp.text();
            const linhas = text.split('\n').filter(l => l.trim() !== "");
            const tbody = document.getElementById('corpo-tabela');
            const agora = new Date();
            const minAgora = agora.getHours() * 60 + agora.getMinutes();
            
            for (let i = 1; i < linhas.length; i++) {
                const cols = linhas[i].split(',');
                const [h, m] = cols[1].trim().split(':');
                if (parseInt(h)*60 + parseInt(m) >= minAgora) {
                    tbody.innerHTML += `<tr><td>${cols[1]}</td><td>${cols[4]}</td><td>${cols[2]}</td></tr>`;
                    if (i === 1) document.getElementById('info-destaque').innerText = `${cols[2]} - ${cols[1]}`;
                }
            }
        }

        function rodarMensagens() {
            if (mensagens.length > 0) {
                document.getElementById('box-informativo').innerText = mensagens[msgIndex % mensagens.length];
                msgIndex++;
                setTimeout(rodarMensagens, 5000);
            }
        }

        iniciarSistema();
        setInterval(iniciarSistema, 30000);
    </script>
</body>
</html>
